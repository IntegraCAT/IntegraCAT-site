<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../source/style/reset.css" />
    <link rel="stylesheet" href="../source/style/variables.css" />
    <link rel="stylesheet" href="../source/style/dashboard/dashboard.css" />
    <link rel="stylesheet" href="../source/style/components.css" />
    <link rel="stylesheet" href="../source/style/dashboard/components.css">

    <link rel="shortcut icon" href="../source/img/logo integraCAT-nolet.svg" type="image/x-icon">

    <title>Dashboard - integraCAT</title>
  </head>
  <body>
    <div class="container">
      
      <app-sidebar></app-sidebar>

      <main class="content">
        <h1>Configurações da Conta</h1>

        <section class="content-section configuracoes">
          <h2 class="visually-hidden">Configurações</h2>
          <form id="informacoes-basicas" class="informacoes">
            <section>
              <h3>Informações Básicas</h3>
              <div class="configuracoes-basicas">
                <div>
                  <div id="alterar-foto">
                    <img
                      src="../source/img/people/user-default.png"
                      alt="foto usuário" 
                    />

                    <input src="../source/img/icons/image-icon.svg" type="image" id="imagem"/>
                  </div>
                </div>
                <div>
                  <label for="nome">Nome</label><br />
                  <input
                    type="text"
                    id="nome"
                    placeholder="Seu nome aqui..."
                  />
                  <br />

                  <label for="cargo">Cargo</label> <br />
                  <input
                    type="text"
                    id="cargo"
                    placeholder="Seu cargo aqui..."
                  />
                  <br />

                  <label for="empresa">Empresa</label> <br />
                  <input
                    type="text"
                    id="empresa"
                    placeholder="Empresa atual aqui..."
                  />
                  <br />
                </div>
              </div>
            </section>

            <section class="configuracoes-avancadas">
              <h3>Informações Avançadas</h3>

              <label for="email">E-mail</label><br />
              <input type="email" id="email" /><br />

              <label for="senha">Senha</label><br />
              <input
                type="password"
                id="senha"
                placeholder="Alterar senha"
              /><br />
            </section>

            <div id="btn-informacoes" class="container-btn esconder">
              <button type="submit" class="btn-green">Salvar</button>
              <button type="reset" class="btn-purple">Cancelar</button>
            </div>
          </form>
          <section class="excluir-section">
            <h3>Excluir Conta</h3>
            <button id="btn-excluir-conta" class="btn-red">EXCLUIR CONTA</button>
          </section>
        </section>
      </main>
    </div>
    <script src="../source/js/components/sidebar.js" defer></script>
    <script src="../source/js/dashboardSideNav.js"></script>
    <script src="../source/js/configurações.js"></script>

    
    <!-- API VLibras -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
  </body>
</html>
