<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/source/style/reset.css" />
    <link rel="stylesheet" href="/source/style/variables.css" />
    <link rel="stylesheet" href="/source/style/dashboard/dashboard.css" />
    <link rel="stylesheet" href="/source/style/components.css" />
    <link rel="stylesheet" href="/source/style/dashboard/components.css">

    <link rel="shortcut icon" href="/source/img/logo integraCAT-nolet.svg" type="image/x-icon">

    <title>Dashboard - integraCAT</title>
  </head>
  <body>
    <div class="container">
      <nav class="sidebar-nav">
        <div class="title-logo">
          <img src="/source/img/logo integraCAT-nolet.svg" alt="logo - IntegraCAT" />
          <img
            src="/source/img/lettering integraCAT.svg"
            alt="letreiro - IntegraCAT"
          />
          <button>
            <img
              src="/source/img/icons/backArrow2.svg"
              alt="voltar" width="24px"
            />
          </button>
        </div>
        <ul>
          <li>
            <a href="/pages/dashboard.html">
              <img
                src="/source/img/icons/dashboard-icons/dashboard-icon.svg"
                alt="dashboard-icon"
              />
              <p>Dashboard</p>
            </a>
          </li>
          <li>
            <a href="/pages/dashboard-historico.html">
              <img
                src="/source/img/icons/dashboard-icons/historic-icon.svg"
                alt="historico-icon"
              />
              <p>Histórico de Ocorrências</p>
            </a>
          </li>
          <li>
            <a href="/pages/dashboard-criarOcorrencia.html">
              <img
                src="/source/img/icons/dashboard-icons/create-icon.svg"
                alt="criar-icon"
              />
              <p>Criar Ocorrências</p>
            </a>
          </li>
          <li>
            <a href="">
              <img
                src="/source/img/icons/dashboard-icons/lecture-icon.svg"
                alt="palestras-icon"
              />
              <p>Palestras</p>
            </a>
          </li>
          <li>
            <a href="">
              <img
                src="/source/img/icons/dashboard-icons/content-icon.svg"
                alt="conteudos-icon"
              />
              <p>Conteúdos</p>
            </a>
          </li>
          <li>
            <a href="/pages/dashboard-configuracoes.html">
              <img
                src="/source/img/icons/dashboard-icons/config-icon.svg"
                alt="configuracaes-icon"
              />
              <p>Configurações</p>
            </a>
          </li>
          <li>
            <a id="btn-sair" href="/index.html">
              <img
                src="/source/img/icons/dashboard-icons/leave-icon.svg"
                alt="sair-icon"
              />
              <p>Sair da Conta</p>
            </a>
          </li>
        </ul>
      </nav>
      <main class="content">
        <h1>Configurações da Conta</h1>

        <section class="content-section configurcoes">
          <h2 class="visually-hidden">Configurações</h2>
          <form id="informacoes-basicas" class="informacoes">
            <section>
              <h3>Informações Básicas</h3>
              <div class="configuracaes-basicas">
                <div>
                  <div id="alterar-foto">
                    <img
                      src="/source/img/placeholder-cat.webp"
                      alt="foto usuário"
                    />

                    <input type="image" id="imagem"/>
                  </div>
                </div>
                <div>
                  <label for="nome">Nome</label><br />
                  <input
                    type="text"
                    id="nome"
                    placeholder="Seu nome aqui..."
                  />
                  <br />

                  <label for="cargo">Cargo</label> <br />
                  <input
                    type="text"
                    id="cargo"
                    placeholder="Seu cargo aqui..."
                  />
                  <br />

                  <label for="empresa">Empresa</label> <br />
                  <input
                    type="text"
                    id="empresa"
                    placeholder="Empresa atual aqui..."
                  />
                  <br />
                </div>
              </div>
            </section>

            <section class="configuracaes-avancadas">
              <h3>Informações Avançadas</h3>

              <label for="email">E-mail</label><br />
              <input type="email" id="email" /><br />

              <label for="senha">Senha</label><br />
              <input
                type="password"
                id="senha"
                placeholder="Alterar senha"
              /><br />
            </section>

            <div id="btn-informacoes" class="container-btn esconder">
              <button type="submit" class="btn-green">Salvar</button>
              <button type="reset" class="btn-purple">Cancelar</button>
            </div>
          </form>
          <section class="excluir-section">
            <h3>Excluir Conta</h3>

            <button id="btn-excluir-conta" class="btn-red">EXCLUIR CONTA</button>
          </section>
        </section>
      </main>
    </div>
    <script src="/source/js/dashboardSideNav.js"></script>
    <script src="/source/js/configurações.js"></script>
    
    <!-- API VLibras -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
  </body>
</html>
