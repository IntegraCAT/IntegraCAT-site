<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../source/style/reset.css" />
    <link rel="stylesheet" href="../source/style/variables.css" />
    <link rel="stylesheet" href="../source/style/dashboard/dashboard.css" />
    <link rel="stylesheet" href="../source/style/components.css" />
    <link rel="stylesheet" href="../source/style/dashboard/components.css" />

    <link
      rel="shortcut icon"
      href="../source/img/logo integraCAT-nolet.svg"
      type="image/x-icon"
    />

    <title>Dashboard - integraCAT</title>
  </head>
  <body>
    <div class="container">
      <button id="btn-abrir">
        <img src="../source/img/icons/menu.svg" alt="Abrir menu" width="30px">
      </button>
      <nav class="sidebar-nav">
        <div class="title-logo">
          <img
            src="../source/img/logo integraCAT-nolet.svg"
            alt="logo - IntegraCAT"
          />
          <img
            src="../source/img/lettering integraCAT.svg"
            alt="letreiro - IntegraCAT"
          />
          <button id="btn-fechar">
            <img
              src="../source/img/icons/backArrow2.svg"
              alt="voltar"
              width="24px"
            />
          </button>
        </div>
        <ul>
          <li>
            <a href="/pages/dashboard.html">
              <img
                src="../source/img/icons/dashboard-icons/dashboard-icon.svg"
                alt="dashboard-icon"
              />
              <p>Dashboard</p>
            </a>
          </li>
          <li>
            <a href="/pages/dashboard-historico.html">
              <img
                src="../source/img/icons/dashboard-icons/historic-icon.svg"
                alt="historico-icon"
              />
              <p>Histórico de Ocorrências</p>
            </a>
          </li>
          <li>
            <a href="/pages/dashboard-criarOcorrencia.html">
              <img
                src="../source/img/icons/dashboard-icons/create-icon.svg"
                alt="criar-icon"
              />
              <p>Criar Ocorrências</p>
            </a>
          </li>
          <li>
            <a href="">
              <img
                src="../source/img/icons/dashboard-icons/lecture-icon.svg"
                alt="palestras-icon"
              />
              <p>Palestras</p>
            </a>
          </li>
          <li>
            <a href="">
              <img
                src="../source/img/icons/dashboard-icons/content-icon.svg"
                alt="conteudos-icon"
              />
              <p>Conteúdos</p>
            </a>
          </li>
          <li>
            <a href="/pages/dashboard-configuracoes.html">
              <img
                src="../source/img/icons/dashboard-icons/config-icon.svg"
                alt="configuracaes-icon"
              />
              <p>Configurações</p>
            </a>
          </li>
          <li>
            <a id="btn-sair" href="../index.html">
              <img
                src="../source/img/icons/dashboard-icons/leave-icon.svg"
                alt="sair-icon"
              />
              <p>Sair da Conta</p>
            </a>
          </li>
        </ul>
      </nav>
      <main class="content">
        <h1>Histórico de Ocorrências</h1>

        <section class="content-section">
          <h2 class="visually-hidden">Histórico</h2>
          <div class="container-search">
            <div class="search-bar">
              <button>
                <img src="../source/img/icons/Search.svg" alt="lupa" />
              </button>
              <input id="pesquisa" type="text" placeholder="Pesquisar..." />
            </div>

            <div class="filtros-grid">
              <div class="filtros-row">
                <div class="campo">
                  <label>Período</label>
                  <select id="periodo">
                    <option value="">Não definido...</option>
                    <option value="mes">Neste Mês</option>
                    <option value="semestre">Neste Semestre</option>
                    <option value="neste_ano">Neste Ano</option>
                    <option value="todos">Todos</option>
                  </select>
                </div>

                <div class="campo">
                  <label for="setor">Setor</label>
                  <select id="setor" name="setor">
                    <option value="">
                      Não definido...
                    </option>
                    <option value="adm">Administrativo / Escritório</option>
                    <option value="logistica">Entregas / Logística</option>
                    <option value="producao">Linha de Produção / Fábrica</option>
                    <option value="manutencao">Manutenção / Oficina</option>
                    <option value="limpeza">Serviços Gerais / Limpeza</option>
                    <option value="ti">TI / Infraestrutura</option>
                    <option value="externo">Campo / Operações Externas</option>
                  </select>
                </div>
              </div>

              <div class="filtros-row">
                <div class="campo">
                  <label for="nivel">Nível da ocorrência</label>
                  <select id="nivel" name="nivel">
                    <option value="" >Não definido...</option>
                    <option value="alto">Alto</option>
                    <option value="medio">Médio</option>
                    <option value="baixo">Baixo</option>
                  </select>
                </div>

                <div class="campo">
                  <label for="tipo">Tipo da Ocorrência</label>
                    <select id="tipo" name="tipo">
                      <option value="">
                        Não definido...
                      </option>
                      <option value="acidente_com_afastamento">
                        Acidente com Afastamento
                      </option>
                      <option value="acidente_sem_afastamento">
                        Acidente sem Afastamento
                      </option>
                      <option value="incidente_quase_acidente">
                        Incidente (Quase Acidente)
                      </option>
                      <option value="trajeto">Acidente de Trajeto</option>
                      <option value="doenca_ocupacional">
                        Doença Ocupacional
                      </option>
                      <option value="primeiros_socorros">
                        Atendimento de Primeiros Socorros
                      </option>
                      <option value="risco_ambiental">
                        Risco Ambiental / Vazamento
                      </option>
                    </select>
                </div>
              </div>

              <div class="campo">
                <label>Status</label>
                <select id="status">
                  <option value="">
                    Não definido...
                  </option>
                  <option value="aberto">Aberto</option>
                  <option value="fechado">Fechado</option>
                </select>
              </div>
            </div>

            <button id="btn-pesquisa" class="btn-green">PESQUISAR</button>
          </div>

          <section id="resultados">
            <h3>Resultados</h3>
            <div id="container-resultados"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="../source/js/mostrarOcorrencias.js"></script>
    <script src="../source/js/dashboardSideNav.js"></script>
    <script src="../source/js/sidebar.js"></script>

    <!-- API VLibras -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>
  </body>
</html>
