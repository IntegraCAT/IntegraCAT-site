<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../source/style/reset.css" />
    <link rel="stylesheet" href="../source/style/variables.css" />
    <link rel="stylesheet" href="../source/style/dashboard/dashboard.css" />
    <link rel="stylesheet" href="../source/style/components.css" />
    <link rel="stylesheet" href="../source/style/dashboard/components.css" />

    <link
      rel="shortcut icon"
      href="../source/img/logo integraCAT-nolet.svg"
      type="image/x-icon"
    />

    <title>Dashboard - integraCAT</title>
  </head>

  <body>
    <div class="container">
      <app-sidebar></app-sidebar>

      <main id="main-container" class="content">
        <div class="title-header">
          <h1>Palestras</h1>
          <a href="../pages/dashboard.html">← Voltar</a>
        </div>

        <section>
          <h2 class="visually-hidden">Palestrantes</h2>
          <section class="container-ordem">
            <div class="ordem-select">
              <label for="ordem">Ordem</label>
              <select name="ordem" id="ordem">
                <option value="melhor-avaliado">Melhor Avaliado</option>
                <option value="mais-participacoes">Mais participações</option>
              </select>
            </div>
          </section>
          <section id="container-palestras">
            <article class="palestra-card">
              <img src="../source/img/people/user-default.png" alt="" />
              <div>
                <h3>Nome do Palestrantes</h3>
                <p>Especialidade</p>
                <div class="container-estrelas">
                  <img
                    class="estrela"
                    src="../source/img/icons/scoreStar.svg"
                    alt="estrela"
                  />
                  <img
                    class="estrela"
                    src="../source/img/icons/scoreStar.svg"
                    alt="estrela"
                  />
                  <img
                    class="estrela"
                    src="../source/img/icons/scoreStar.svg"
                    alt="estrela"
                  />
                  <img
                    class="estrela"
                    src="../source/img/icons/scoreStar.svg"
                    alt="estrela"
                  />
                  <img
                    class="estrela"
                    src="../source/img/icons/scoreStar.svg"
                    alt="estrela"
                  />
                </div>
                <p>Descrição com no máximo 200 caractéres</p>
                <div class="acoes">
                  <button class="btn-green">AGENDAR PALESTRA</button>
                </div>
              </div>
            </article>
          </section>
        </section>
      </main>
    </div>
    <script src="../source/js/components/sidebar.js" defer></script>
    <script src="../source/js/mostrarPalestrantes.js"></script>
    <script src="../source/js/dashboardSideNav.js"></script>

    <!-- API VLibras -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>
  </body>
</html>
