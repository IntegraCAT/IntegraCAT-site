<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../source/style/reset.css" />
    <link rel="stylesheet" href="../source/style/variables.css" />
    <link rel="stylesheet" href="../source/style/entrar-conta.css" />
    <link rel="stylesheet" href="../source/style/components.css" />
    
    <link rel="shortcut icon" href="../source/img/logo integraCAT-nolet.svg" type="image/x-icon">
    
    <title>Login - IntegraCAT</title>
  </head>
  <body>
     
    <header>
      <nav class="header-nav">
        <div class="title-logo">
          <a href="../index.html">
            <img
              class="voltar-seta"
              src="../source/img/icons/backArrow1.svg"
              alt="voltar"
            />
          </a>
          <img class="lettering-logo"
            src="../source/img/lettering integraCAT.svg"
            alt="letreiro - IntegraCAT"
          />
        </div>
        <button class="menu" aria-label="Abrir menu">
          <img src="../source/img/icons/menu.svg" alt="menu" width="30px">
        </button>
        <ul>
          <li><a href="#beneficios" class="header-link">BENEFÍCIOS</a></li>
          <li><a href="#sistema" class="header-link">SISTEMA</a></li>
          <li><a href="#palestras" class="header-link">PALESTRAS</a></li>
          <li><a href="#precos" class="header-link">PREÇOS</a></li>
          <li><a href="#leads" class="header-link">CADASTRAR</a></li>
          <li><a class="btn-green btn-mobile" href="./pages/entrarNaConta.html">ENTRAR</a></li>
        </ul>
        <a id="btn-entrar-conta" class="btn-green btn-desktop" href="./pages/entrarNaConta.html">ENTRAR</a>
      </nav>
    </header>

    <main class="campos-registro">
      <section id="autenticacao">
        <h1>Faça o login</h1>
        <form class="auth-form" action="" id="loginForm">
          <label for="identidade">Nome</label><br />
          <input type="text" name="" id="identidade" required/><br />

          <label for="email">E-mail</label><br />
          <input type="email" name="" id="email" required/><br />

          <label for="senha">Senha</label><br />
          <input type="password" name="" id="senha" required/><br />
          <div class="container-opcoes">
            <a href="">Esqueci minha senha</a>
            <p>
              Ou, caso não tenha conta:
              <a href="#" id="btn-abrir-registro">Registrar Conta</a>
            </p>
          </div>

          <div class="container-btn">
            <button type="submit" class="btn-green">ENTRAR</button>
          </div>
        </form>
      </section>
    </main>
   
    <!-- Modal registrar conta -->
     <dialog id="modal-registro" class="modal">
      <section id="conteiner-opcoes">
        <button id="btn-fechar-registro" class="btn-fechar" aria-label="Fechar">✖</button>

        <h1>Registrar conta</h1>
        
        <div class="container-btn">
          <a class="btn-purple" href="../pages/registrarUser.html">Registrar Usuário</a>
        </div>
        
        <p>ou, caso seja uma empresa</p>
        
        <div class="container-btn">
          <a class="btn-purple" href="../pages/registrarEmpresa.html">Registrar Empresa</a>
        </div>
      </section>
    </dialog>

    <app-footer></app-footer>
    
    <script src="../source/js/components/footer.js" defer></script>
    <script src="../source/js/loginConta.js"></script>
    <script src="../source/js/modal.js" defer></script>
    <script src="../source/js/header.js" defer></script>

    <!-- API VLibras -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
  </body>
</html>
