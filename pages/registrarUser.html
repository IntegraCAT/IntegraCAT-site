<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../source/style/reset.css" />
    <link rel="stylesheet" href="../source/style/variables.css" />
    <link rel="stylesheet" href="../source/style/entrar-conta.css" />
    <link rel="stylesheet" href="../source/style/components.css" />

    <link rel="shortcut icon" href="../source/img/logo integraCAT-nolet.svg" type="image/x-icon" />

    <title>Registrar Usuário - IntegraCAT</title>
</head>

<body>

    <header>
        <nav class="header-nav">
            <div class="title-logo">
                <a href="./entrarNaConta.html">
                    <img class="voltar-seta" src="../source/img/icons/backArrow1.svg" alt="voltar" />
                </a>
                <a href="../index.html">
                    <img class="lettering-logo" src="../source/img/lettering integraCAT.svg" alt="letreiro - IntegraCAT" />
                </a>
            </div>
            <button class="menu" aria-label="Abrir menu">
          <img src="../source/img/icons/menu.svg" alt="menu" width="30px">
        </button>
            <ul>
                <li><a href="#beneficios" class="header-link">BENEFÍCIOS</a></li>
                <li><a href="#sistema" class="header-link">SISTEMA</a></li>
                <li><a href="#palestras" class="header-link">PALESTRAS</a></li>
                <li><a href="#precos" class="header-link">PREÇOS</a></li>
                <li><a href="#leads" class="header-link">CADASTRAR</a></li>
                <li><a class="btn-green btn-mobile" href="./pages/entrarNaConta.html">ENTRAR</a></li>
            </ul>
            <a id="btn-entrar-conta" class="btn-green btn-desktop" href="./pages/entrarNaConta.html">ENTRAR</a>
        </nav>
    </header>

    <main class="campos-registro">
        <h1>Registrar conta do Usuário</h1>
        <section id="autenticacao">
            <h3>Crie sua conta</h3>
            <form id="register-form" class="auth-form" action="">
                <label for="identidade">Nome do Usuário</label><br />
                <input type="text" name="" id="identidade" required /><br />

                <label for="email">E-mail</label><br />
                <input type="email" name="" id="email" required /><br />

                <div class="container-opcoes">
                    <div>
                        <label for="senha">Senha</label><br />
                        <input type="password" name="" id="senha" required /><br />
                    </div>

                    <div>
                        <label for="repetirsenha">Repita a Senha</label><br />
                        <input type="password" name="" id="repetir-senha" required />
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" name="" id="mostrar-senha" onclick="mostrarSenha()" />
                    <label for="mostrar-senha">Mostrar senha</label><br />
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" name="privacidade" id="privacidade" required />
                    <label for="privacidade">
              Estou de acordo com os <a href="">Termos de Serviço</a> e a <a href="">Política de
              Privacidade</a>.
            </label>
                </div>

                <div class="container-mandar">
                    <p>Caso já tenha uma conta: <a href="../pages/entrarNaConta.html">Entrar na Conta</a></p>

                    <button type="submit" id="btn-register" class="btn-green">
              CONFIRMAR REGISTRO
            </button>
                </div>
            </form>
        </section>
    </main>

    <app-footer></app-footer>

    <script src="../source/js/registrarUsuario.js"></script>
    <script src="../source/js/components/footer.js" defer></script>
    <script src="../source/js/header.js"></script>

    <!-- API VLibras -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
</body>

</html>
