<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../source/style/reset.css" />
    <link rel="stylesheet" href="../source/style/variables.css" />
    <link rel="stylesheet" href="../source/style/dashboard/dashboard.css" />
    <link rel="stylesheet" href="../source/style/components.css" />
    <link rel="stylesheet" href="../source/style/dashboard/components.css" />

    <link
      rel="shortcut icon"
      href="../source/img/logo integraCAT-nolet.svg"
      type="image/x-icon"
    />

    <title>Dashboard - integraCAT</title>
  </head>
  <body>
    <div class="container">

      <app-sidebar></app-sidebar>
      
      <main class="content">
        <div class="title-header">
          <h1>Criar Ocorrência</h1>
          <a href="">← Voltar</a>
        </div>

        <section class="content-section">
          <h2 class="visually-hidden">Ocorrência</h2>
          <section class="conteiner-nova-ocorrencia">
            <h3>Nova Ocorrência</h3>
            <form class="form-ocorrencia">
              <div class="form-section">
                <h4>Título</h4>
                <label for="titulo">Título da ocorrência</label>
                <input id="titulo" type="text" placeholder="Título..." />
              </div>

              <div class="form-section">
                <h4>Dados do Colaborador</h4>
                <label for="colaborador">Nome do Colaborador</label>
                <input id="colaborador" type="text" placeholder="Nome..." />
              </div>
 
              <div class="form-section">
                <h4>Dados do Fato</h4>
                <div class="form-row">
                  <div class="campo">
                    <label for="data">Data</label>
                    <input id="data" type="date" placeholder="DD/MM/AA" />
                  </div>
                  <div class="campo">
                    <label for="horario">Horário</label>
                    <input id="horario" type="time" placeholder="HH:MM" />
                  </div>
                </div>
              </div>

              <div class="form-section">
                <h4>Detalhes</h4>
                <div class="campo-textarea">
                  <label for="descricao">Descrição</label>
                  <textarea
                    id="descricao"
                    placeholder="Descrição..."
                  ></textarea>
                </div>
                
                <div class="form-row">
                  <div class="campo">
                    <label for="setor">Setor</label>
                    <select id="setor" name="setor">
                      <option value="" disabled selected>
                        Selecione o setor...
                      </option>
                      <option value="adm">Administrativo / Escritório</option>
                      <option value="logistica">Entregas / Logística</option>
                      <option value="producao">
                        Linha de Produção / Fábrica
                      </option>
                      <option value="manutencao">Manutenção / Oficina</option>
                      <option value="limpeza">Serviços Gerais / Limpeza</option>
                      <option value="ti">TI / Infraestrutura</option>
                      <option value="externo">
                        Campo / Operações Externas
                      </option>
                    </select>
                  </div>
                  <div class="campo">
                    <label for="tipo">Tipo da Ocorrência</label>
                    <select id="tipo" name="tipo">
                      <option value="" disabled selected>
                        Selecione o tipo...
                      </option>
                      <option value="acidente_com_afastamento">
                        Acidente com Afastamento
                      </option>
                      <option value="acidente_sem_afastamento">
                        Acidente sem Afastamento
                      </option>
                      <option value="incidente_quase_acidente">
                        Incidente (Quase Acidente)
                      </option>
                      <option value="trajeto">Acidente de Trajeto</option>
                      <option value="doenca_ocupacional">
                        Doença Ocupacional
                      </option>
                      <option value="primeiros_socorros">
                        Atendimento de Primeiros Socorros
                      </option>
                      <option value="risco_ambiental">
                        Risco Ambiental / Vazamento
                      </option>
                    </select>
                  </div>
                </div>
                <div>
                  <label for="nivel">Nível da ocorrência</label>
                  <select id="nivel" name="nivel">
                    <option value="" disabled selected>Selecione o Nível da ocorrência...</option>
                    <option value="alto">Alto</option>
                    <option value="medio">Médio</option>
                    <option value="baixo">Baixo</option>
                  </select>
                </div>
              </div>

              <div class="form-section">
                <h4>Consequência</h4>
                <div>
                  <label for="afastamento"
                    >Houve necessidade de afastamento?</label
                  >
                  <select id="afastamento" name="afastamento">
                    <option value="" disabled selected>Afastamento...</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                  </select>
                </div>
              </div>

              <div class="container-btn">
                <button
                  id="btn-salvar-ocorrencia"
                  type="button"
                  class="btn-green"
                >
                  SALVAR
                </button>
                <button type="button" class="btn-purple">CANCELAR</button>
              </div>
            </form>
          </section>
        </section>
      </main>
    </div>
    <script src="../source/js/components/sidebar.js" defer></script>
    <script src="../source/js/criarOcorrencias.js"></script>
    <script src="../source/js/dashboardSideNav.js"></script>
    

    <!-- API VLibras -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>
  </body>
</html>
