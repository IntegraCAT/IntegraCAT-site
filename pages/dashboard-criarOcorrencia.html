<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/source/style/reset.css" />
    <link rel="stylesheet" href="/source/style/variables.css" />
    <link rel="stylesheet" href="/source/style/dashboard/dashboard.css" />
    <link rel="stylesheet" href="/source/style/components.css" />

    <link
      rel="shortcut icon"
      href="/source/img/logo integraCAT-nolet.svg"
      type="image/x-icon"
    />

    <title>Dashboard - integraCAT</title>
  </head>
  <body>
    <div class="container">
      <nav class="sidebar-nav">
        <div class="title-logo">
          <img src="/source/img/logo integraCAT-nolet.svg" alt="logo - IntegraCAT" />
          <img
            src="/source/img/lettering integraCAT.svg"
            alt="letreiro - IntegraCAT"
          />
          <button>
            <img
              src="/source/img/icons/backArrow2.svg"
              alt="voltar" width="24px"
            />
          </button>
        </div>
        <ul>
          <li>
            <a href="/pages/dashboard.html">
              <img
                src="/source/img/icons/dashboard-icons/dashboard-icon.svg"
                alt="dashboard-icon"
              />
              <p>Dashboard</p>
            </a>
          </li>
          <li>
            <a href="/pages/dashboard-historico.html">
              <img
                src="/source/img/icons/dashboard-icons/historic-icon.svg"
                alt="historico-icon"
              />
              <p>Histórico de Ocorrências</p>
            </a>
          </li>
          <li>
            <a href="/pages/dashboard-criarOcorrencia.html">
              <img
                src="/source/img/icons/dashboard-icons/create-icon.svg"
                alt="criar-icon"
              />
              <p>Criar Ocorrências</p>
            </a>
          </li>
          <li>
            <a href="">
              <img
                src="/source/img/icons/dashboard-icons/lecture-icon.svg"
                alt="palestras-icon"
              />
              <p>Palestras</p>
            </a>
          </li>
          <li>
            <a href="">
              <img
                src="/source/img/icons/dashboard-icons/content-icon.svg"
                alt="conteudos-icon"
              />
              <p>Conteúdos</p>
            </a>
          </li>
          <li>
            <a href="/pages/dashboard-configuracoes.html">
              <img
                src="/source/img/icons/dashboard-icons/config-icon.svg"
                alt="configuracaes-icon"
              />
              <p>Configurações</p>
            </a>
          </li>
          <li>
            <a href="/index.html">
              <img
                src="/source/img/icons/dashboard-icons/leave-icon.svg"
                alt="sair-icon"
              />
              <p>Sair da Conta</p>
            </a>
          </li>
        </ul>
      </nav>
      <main class="content">
        <div class="title-header">
          <h1>Criar Ocorrência</h1>
          <a href="">← Voltar</a>
        </div>

        <section class="content-section">
          <h2 class="visually-hidden">Ocorrência</h2>
          <section class="conteiner-nova-ocorrencia">
            <h3>Nova Ocorrência</h3>
            <form class="form-ocorrencia">
              <div class="form-section">
                <h4>Dados do Colaborador</h4>
                <div class="campo">
                  <label>Nome do Colaborador</label>
                  <input type="text" placeholder="Nome..." />
                </div>
              </div>

              <div class="form-section">
                <h4>Dados do Fato</h4>
                <div class="form-row">
                  <div class="campo">
                    <label>Data</label>
                    <input type="date" placeholder="DD/MM/AA" />
                  </div>
                  <div class="campo">
                    <label>Horário</label>
                    <input type="time" placeholder="HH:MM" />
                  </div>
                </div>
              </div>

              <div class="form-section">
                <h4>Detalhes</h4>
                <div class="campo-textarea">
                  <label>Descrição</label>
                  <textarea placeholder="Descrição..."></textarea>
                </div>

                <div class="form-row">
                  <div class="campo">
                    <label for="setor">Setor</label>
                    <select id="setor" name="setor">
                      <option value="" disabled selected>
                        Selecione o setor...
                      </option>
                      <option value="adm">Administrativo / Escritório</option>
                      <option value="logistica">Entregas / Logística</option>
                      <option value="producao">
                        Linha de Produção / Fábrica
                      </option>
                      <option value="manutencao">Manutenção / Oficina</option>
                      <option value="limpeza">Serviços Gerais / Limpeza</option>
                      <option value="ti">TI / Infraestrutura</option>
                      <option value="externo">
                        Campo / Operações Externas
                      </option>
                    </select>
                  </div>
                  <div class="campo">
                    <label for="tipo">Tipo da Ocorrência</label>
                    <select id="tipo" name="tipo">
                      <option value="" disabled selected>
                        Selecione o tipo...
                      </option>
                      <option value="acidente_com_afastamento">
                        Acidente com Afastamento
                      </option>
                      <option value="acidente_sem_afastamento">
                        Acidente sem Afastamento
                      </option>
                      <option value="incidente_quase_acidente">
                        Incidente (Quase Acidente)
                      </option>
                      <option value="trajeto">Acidente de Trajeto</option>
                      <option value="doenca_ocupacional">
                        Doença Ocupacional
                      </option>
                      <option value="primeiros_socorros">
                        Atendimento de Primeiros Socorros
                      </option>
                      <option value="risco_ambiental">
                        Risco Ambiental / Vazamento
                      </option>
                    </select>
                  </div>
                </div>

                <div>
                  <label>Nível da ocorrência</label>
                  <select>
                    <option value="" disabled selected>
                      Selecione o Nível da ocorrência...
                    </option>
                    <option>Alto</option>
                    <option>Médio</option>
                    <option>Baixo</option>
                  </select>
                </div>
              </div>

              <div class="form-section">
                <h4>Consequência</h4>
                <div>
                  <label>Houve necessidade de afastamento?</label>
                  <select>
                    <option value="" disabled selected>Afastamento...</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                  </select>
                </div>
              </div>

              <div class="container-btn">
                <button type="submit" class="btn-green">SALVAR</button>
                <button type="button" class="btn-purple">CANCELAR</button>
              </div>
            </form>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
